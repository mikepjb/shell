# vim: set ft=conf
cursor-color = ff00ff
font-family = "Rec Mono Linear"
font-size = 16
cursor-style-blink = false
background-opacity = 0.95
title = " "
auto-update = off
window-height = 55
window-width = 100

theme = dark:spartan-dark,light:spartan-light

# theme = dark:Catppuccin Frappe,light:Catppuccin Latte

gtk-titlebar-hide-when-maximized = true

macos-non-native-fullscreen = padded-notch
macos-option-as-alt = true
macos-titlebar-proxy-icon = hidden

keybind = super+enter=toggle_fullscreen
# keybind = global:alt+space=toggle_visibility
keybind = alt+enter=toggle_maximize
# keybind = alt+enter=toggle_fullscreen
keybind = super+Digit1=text:\x1b1
keybind = super+Digit2=text:\x1b2
keybind = super+Digit3=text:\x1b3

# increase_font_size
# decrease_font_size
# keybind = alt+Digit3=text:\x1b3
